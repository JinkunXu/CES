# ================================
# Multi-domain config (10 CAPs)
# Compatible with: run_kabb.py / kabb/utils.py
# ================================

# ================================
# System Prompts
# ================================
system_prompts:
  default: |
    You are a helpful assistant. Follow the user's request carefully.
    When solving problems, be precise. If unsure, say so briefly and proceed with best effort.

  error_handling: |
    If a request is ambiguous or missing key info, state assumptions clearly and continue.

# ================================
# Domain Inference Settings
# Used by logic_based_domain_inference() in kabb/utils.py
# ================================
domain_inference_settings:
  math:
    prior: 0.80
    typical_samples: |
      Solve for x in an equation. Compute an integral. Evaluate a probability.
      Prove a statement or compute a determinant. Work with algebra/geometry/calculus.
    difficulty_range: [1, 5]
    symbol_patterns:
      - "math"
      - "algebra"
      - "geometry"
      - "calculus"
      - "integral"
      - "derivative"
      - "limit"
      - "probability"
      - "statistics"
      - "matrix"
      - "determinant"
      - "\\frac"
      - "\\sqrt"
      - "\\sum"
      - "\\int"
      - "\\pi"
      - "="
    weights:
      overlap: 0.35
      path_distance: 0.35
      historical_similarity: 0.30

  physics_chem:
    prior: 0.60
    typical_samples: |
      Explain or compute results in physics/chemistry: forces, energy, circuits,
      thermodynamics, electromagnetism, stoichiometry, reactions, pH, equilibrium.
    difficulty_range: [1, 5]
    symbol_patterns:
      - "physics"
      - "chemistry"
      - "force"
      - "energy"
      - "momentum"
      - "circuit"
      - "voltage"
      - "current"
      - "thermodynamics"
      - "electromagnetism"
      - "reaction"
      - "molar"
      - "stoichiometry"
      - "equilibrium"
      - "pH"
    weights:
      overlap: 0.35
      path_distance: 0.35
      historical_similarity: 0.30

  bio_medicine:
