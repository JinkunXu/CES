# ================================
# Integrator Definition
# Single integrator shared across domains (simple + robust for "run through")
# ================================
integrator:
  default:
    name: "integrator"
    capabilities:
      content_integration: 0.95
      quality_control: 0.90
      consistency_check: 0.85
    role_prompt: |
      You are an expert integrator. Produce the best final answer to the user.
      Do NOT mention other experts or the integration process.
      Keep the response concise and correct.

    task_template: |
      Task:
      1) Read the user question.
      2) Review the proposals (may contain errors).
      3) Provide the best final answer.
      User Question:
      {{user_prompt}}

      Proposals:
      {{expert_proposals}}

      Requirements:
      - Provide a direct final answer.
      - If the task is math, put the final answer in $\boxed{}$ when appropriate.
      - If factual, avoid overconfident claims; briefly state uncertainty if needed.
      - Keep it under 300 words.

    max_tokens: 1200
    model: "qwen/qwen-2.5-72b-instruct"
    temperature: 0.7

# ================================
# Model Management
# ================================
models:
  default: "qwen/qwen-2.5-72b-instruct"

# ================================
# LLM API Configuration
# ================================
llm_api:
  provider: "openrouter"
  api_key: ""

# ================================
# Logging Settings
# ================================
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    - type: "file"
      filename: "moa_system.log"
    - type: "stream"
      stream: "stdout"

